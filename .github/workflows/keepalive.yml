name: Keep Streamlit apps awake

# Streamlit Community Cloud apps sleep after 12 hours of inactivity, and the
# wake-up button inside an embedded iframe is blocked by browser third-party
# cookie policies. This workflow visits each app every 6 hours using a headless
# browser so they stay warm for readers of the embedded article.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.47.0
          python -m playwright install --with-deps chromium

      - name: Ping Streamlit apps
        run: python scripts/keepalive.py
